<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>문의하기 - CocoFlow</title>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8616886611208474"
       crossorigin="anonymous"></script>
  <link rel="canonical" href="https://cocoflow.xyz/contact/">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #2563eb; --primary-dark: #1d4ed8;
      --bg: #f0f4f8; --white: #ffffff;
      --text: #1e293b; --text-muted: #64748b; --border: #e2e8f0;
    }
    body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); line-height: 1.8; }
    header { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; padding: 0 24px; }
    .header-inner { max-width: 800px; margin: 0 auto; display: flex; align-items: center; height: 60px; }
    .logo { font-size: 1.4rem; font-weight: 700; color: white; text-decoration: none; }
    .logo span { opacity: 0.7; font-weight: 400; }
    main { max-width: 800px; margin: 0 auto; padding: 48px 24px; }
    .card { background: var(--white); border-radius: 12px; padding: 40px; border: 1px solid var(--border); }
    h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 16px; }
    p { font-size: 0.95rem; color: var(--text-muted); margin-bottom: 16px; }
    .contact-box {
      background: #eff6ff; border: 1px solid #bfdbfe; border-radius: 10px;
      padding: 24px; margin-top: 24px; text-align: center;
    }
    .contact-box p { color: var(--text); margin: 0; font-size: 0.95rem; }
    .contact-box a { color: var(--primary); font-weight: 700; text-decoration: none; font-size: 1.1rem; }
    footer { text-align: center; padding: 24px; font-size: 0.8rem; color: var(--text-muted); }
    footer a { color: var(--primary); text-decoration: none; }
  </style>
</head>
<body>
  <header>
    <div class="header-inner">
      <a href="/" class="logo">Coco<span>Flow</span></a>
    </div>
  </header>
  <main>
    <div class="card">
      <h1>문의하기</h1>
      <p>CocoFlow 서비스 이용 중 불편한 점, 계산 오류, 새로운 계산기 제안 등 어떤 의견이든 환영합니다.</p>
      <p>아래 이메일로 문의해 주시면 영업일 기준 1~3일 이내에 답변 드리겠습니다.</p>
      <div class="contact-box">
        <p>📧 이메일 문의</p>
        <a href="mailto:cocoflow.contact@gmail.com">cocoflow.contact@gmail.com</a>
      </div>
    </div>
  </main>
  <footer>
    <a href="/">← CocoFlow 홈으로</a> &nbsp;|&nbsp; © 2026 CocoFlow
  </footer>
</body>
</html>
